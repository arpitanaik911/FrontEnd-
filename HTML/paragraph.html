<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph</title>
</head>
<body>
    <!--case 1-->
    <p>Hello</p>
    <p>Hi!</p>
    <!--case 2-->
    <p> Hello </p><p> Hi! </p>
    <!--case 3-->
    <p> Hello hi! </p> 
    <!--case 4-->
    <p> Hello <br> <!--break line displays in new line-->
                                        H  i!
    </p> 
    <!--preformatted text-->
    <pre> Hello 
                                        H i ! </pre>
    </pre>
</body>
</html>
